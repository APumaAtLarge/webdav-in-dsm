name: Build Docker image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - nginx.conf
      - scripts/generate-htpasswd.sh
      - .github/workflows/docker-image.yml
  pull_request:
    paths:
      - Dockerfile
      - nginx.conf
      - scripts/generate-htpasswd.sh
      - .github/workflows/docker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: ABC

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate basic auth password file
        run: sh scripts/generate-htpasswd.sh
        env:
          BASIC_AUTH_USER: ${{ github.event_name == 'pull_request' && 'ci' || secrets.BASIC_AUTH_USER }}
          BASIC_AUTH_PASSWORD: ${{ github.event_name == 'pull_request' && 'ci' || secrets.BASIC_AUTH_PASSWORD }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
